services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: watcherDB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d watcherDB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: watcherDB
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      ETHERSCAN_BASE_URL: ${ETHERSCAN_BASE_URL:-https://api.etherscan.io/v2/api}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_TTL: ${TOKEN_TTL:-24}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
